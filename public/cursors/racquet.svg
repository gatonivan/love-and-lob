<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Handle outline -->
  <rect x="1" y="28" width="3" height="3" fill="#000"/>
  <rect x="3" y="26" width="3" height="3" fill="#000"/>
  <rect x="5" y="24" width="3" height="3" fill="#000"/>
  <rect x="7" y="22" width="3" height="3" fill="#000"/>
  <rect x="9" y="20" width="3" height="3" fill="#000"/>
  <rect x="11" y="18" width="3" height="3" fill="#000"/>
  <!-- Handle fill -->
  <rect x="2" y="29" width="1" height="1" fill="#DAA520"/>
  <rect x="4" y="27" width="1" height="1" fill="#DAA520"/>
  <rect x="6" y="25" width="1" height="1" fill="#DAA520"/>
  <rect x="8" y="23" width="1" height="1" fill="#DAA520"/>
  <rect x="10" y="21" width="1" height="1" fill="#DAA520"/>
  <rect x="12" y="19" width="1" height="1" fill="#FFD700"/>
  <!-- Handle highlight -->
  <rect x="2" y="28" width="1" height="1" fill="#FFD700"/>
  <rect x="4" y="26" width="1" height="1" fill="#FFD700"/>
  <rect x="6" y="24" width="1" height="1" fill="#FFD700"/>
  <rect x="8" y="22" width="1" height="1" fill="#FFD700"/>
  <rect x="10" y="20" width="1" height="1" fill="#FFD700"/>
  <rect x="12" y="18" width="1" height="1" fill="#FFD700"/>
  <!-- Throat (handle meets head) outline -->
  <rect x="12" y="16" width="4" height="3" fill="#000"/>
  <rect x="13" y="17" width="2" height="1" fill="#008000"/>
  <!-- Head frame outline (black border) -->
  <rect x="15" y="2" width="10" height="1" fill="#000"/>
  <rect x="14" y="3" width="1" height="1" fill="#000"/>
  <rect x="25" y="3" width="1" height="1" fill="#000"/>
  <rect x="13" y="4" width="1" height="1" fill="#000"/>
  <rect x="26" y="4" width="1" height="1" fill="#000"/>
  <rect x="12" y="5" width="1" height="10" fill="#000"/>
  <rect x="27" y="5" width="1" height="10" fill="#000"/>
  <rect x="13" y="15" width="1" height="1" fill="#000"/>
  <rect x="26" y="15" width="1" height="1" fill="#000"/>
  <rect x="14" y="16" width="1" height="1" fill="#000"/>
  <rect x="25" y="16" width="1" height="1" fill="#000"/>
  <rect x="15" y="17" width="10" height="1" fill="#000"/>
  <!-- Head frame fill (green) -->
  <rect x="15" y="3" width="10" height="1" fill="#00AA00"/>
  <rect x="14" y="4" width="1" height="1" fill="#00AA00"/>
  <rect x="25" y="4" width="1" height="1" fill="#00AA00"/>
  <rect x="13" y="5" width="1" height="10" fill="#00AA00"/>
  <rect x="26" y="5" width="1" height="10" fill="#00AA00"/>
  <rect x="14" y="15" width="1" height="1" fill="#00AA00"/>
  <rect x="25" y="15" width="1" height="1" fill="#00AA00"/>
  <rect x="15" y="16" width="10" height="1" fill="#00AA00"/>
  <!-- Head frame highlight (lighter green on top/left) -->
  <rect x="15" y="3" width="10" height="1" fill="#00CC00"/>
  <rect x="13" y="5" width="1" height="5" fill="#00CC00"/>
  <rect x="14" y="4" width="1" height="1" fill="#00CC00"/>
  <!-- Strings horizontal -->
  <rect x="14" y="6" width="12" height="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="14" y="9" width="12" height="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="14" y="12" width="12" height="1" fill="rgba(255,255,255,0.5)"/>
  <!-- Strings vertical -->
  <rect x="16" y="4" width="1" height="12" fill="rgba(255,255,255,0.5)"/>
  <rect x="19" y="4" width="1" height="12" fill="rgba(255,255,255,0.5)"/>
  <rect x="22" y="4" width="1" height="12" fill="rgba(255,255,255,0.5)"/>
</svg>

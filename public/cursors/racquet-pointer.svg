<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Handle outline (more upright for pointer) -->
  <rect x="5" y="28" width="3" height="3" fill="#000"/>
  <rect x="6" y="26" width="3" height="3" fill="#000"/>
  <rect x="7" y="24" width="3" height="3" fill="#000"/>
  <rect x="8" y="22" width="3" height="3" fill="#000"/>
  <rect x="9" y="20" width="3" height="3" fill="#000"/>
  <rect x="10" y="18" width="3" height="3" fill="#000"/>
  <!-- Handle fill -->
  <rect x="6" y="29" width="1" height="1" fill="#DAA520"/>
  <rect x="7" y="27" width="1" height="1" fill="#DAA520"/>
  <rect x="8" y="25" width="1" height="1" fill="#DAA520"/>
  <rect x="9" y="23" width="1" height="1" fill="#DAA520"/>
  <rect x="10" y="21" width="1" height="1" fill="#DAA520"/>
  <rect x="11" y="19" width="1" height="1" fill="#FFD700"/>
  <!-- Handle highlight -->
  <rect x="6" y="28" width="1" height="1" fill="#FFD700"/>
  <rect x="7" y="26" width="1" height="1" fill="#FFD700"/>
  <rect x="8" y="24" width="1" height="1" fill="#FFD700"/>
  <rect x="9" y="22" width="1" height="1" fill="#FFD700"/>
  <rect x="10" y="20" width="1" height="1" fill="#FFD700"/>
  <rect x="11" y="18" width="1" height="1" fill="#FFD700"/>
  <!-- Throat -->
  <rect x="10" y="16" width="4" height="3" fill="#000"/>
  <rect x="11" y="17" width="2" height="1" fill="#008000"/>
  <!-- Head frame outline (black) -->
  <rect x="7" y="1" width="10" height="1" fill="#000"/>
  <rect x="6" y="2" width="1" height="1" fill="#000"/>
  <rect x="17" y="2" width="1" height="1" fill="#000"/>
  <rect x="5" y="3" width="1" height="1" fill="#000"/>
  <rect x="18" y="3" width="1" height="1" fill="#000"/>
  <rect x="4" y="4" width="1" height="11" fill="#000"/>
  <rect x="19" y="4" width="1" height="11" fill="#000"/>
  <rect x="5" y="15" width="1" height="1" fill="#000"/>
  <rect x="18" y="15" width="1" height="1" fill="#000"/>
  <rect x="6" y="16" width="1" height="1" fill="#000"/>
  <rect x="17" y="16" width="1" height="1" fill="#000"/>
  <rect x="7" y="17" width="10" height="1" fill="#000"/>
  <!-- Head frame fill (bright yellow-green for pointer state) -->
  <rect x="7" y="2" width="10" height="1" fill="#FFFF00"/>
  <rect x="6" y="3" width="1" height="1" fill="#FFFF00"/>
  <rect x="17" y="3" width="1" height="1" fill="#FFFF00"/>
  <rect x="5" y="4" width="1" height="11" fill="#FFFF00"/>
  <rect x="18" y="4" width="1" height="11" fill="#FFFF00"/>
  <rect x="6" y="15" width="1" height="1" fill="#FFFF00"/>
  <rect x="17" y="15" width="1" height="1" fill="#FFFF00"/>
  <rect x="7" y="16" width="10" height="1" fill="#FFFF00"/>
  <!-- Head highlight -->
  <rect x="7" y="2" width="10" height="1" fill="#FFFF44"/>
  <rect x="5" y="4" width="1" height="5" fill="#FFFF44"/>
  <rect x="6" y="3" width="1" height="1" fill="#FFFF44"/>
  <!-- Strings horizontal -->
  <rect x="6" y="5" width="12" height="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="6" y="8" width="12" height="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="6" y="11" width="12" height="1" fill="rgba(255,255,255,0.5)"/>
  <!-- Strings vertical -->
  <rect x="8" y="3" width="1" height="13" fill="rgba(255,255,255,0.5)"/>
  <rect x="11" y="2" width="1" height="14" fill="rgba(255,255,255,0.5)"/>
  <rect x="14" y="3" width="1" height="13" fill="rgba(255,255,255,0.5)"/>
</svg>
